    body {

    }

    /* ── Ad container ── */
    [data-section="ad"] {
      width: 1200px;
      height: 628px;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* ── LEFT — Blue panel ── */
    [data-ui="panel-blue"] {
      width: 460px;
      height: 628px;
      background: #1591F0;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 52px 48px;
    }

    [data-ui="vector"] {
      position: absolute;
      width: 680px;
      height: 680px;
      top: 50%;
      left: 50%;
      transform: translate(-28%, -46%) rotate(12deg);
      object-fit: contain;
      pointer-events: none;
      user-select: none;
    }

    [data-ui="content"] {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    [data-ui="logo-white"] {
      margin-bottom: 32px;
    }

    [data-ui="headline"] {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 70px;
      line-height: 0.97;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
    }

    [data-ui="subtitle"] {
      font-family: 'Roboto Condensed', sans-serif;
      font-weight: 500;
      font-size: 22px;
      color: rgba(255,255,255,0.90);
      letter-spacing: -0.44px;
      line-height: 1.2;
    }

    /* ── RIGHT — Photo panel ── */
    [data-ui="panel-photo"] {
      flex: 1;
      height: 628px;
      position: relative;
      overflow: hidden;
    }

    [data-ui="photo"] {
      position: absolute;
      top: -8%;
      left: -12%;
      width: 130%;
      height: 122%;
      object-fit: cover;
      object-position: center top;
    }

    [data-ui="gradient-large"] {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 300px;
      background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, transparent 100%);
      z-index: 2;
    }

    [data-ui="gradient-small"] {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 130px;
      background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 100%);
      z-index: 3;
    }

    [data-ui="rating"] {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      display: flex;
      align-items: center;
      gap: 14px;
      color: #fff;
      font-family: 'Roboto Condensed', sans-serif;
      font-weight: 500;
      font-size: 19px;
      letter-spacing: -0.38px;
      white-space: nowrap;
    }

    [data-ui="stars"] {
      display: flex;
      gap: 3px;
    }

    [data-ui="stars"] span {
      color: #FFB800;
      font-size: 20px;
      line-height: 1;
    }

    [data-ui="divider"] {
      width: 1px;
      height: 22px;
      background: rgba(255,255,255,0.45);
    }
